<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Переводчик звонков</title>
<style>
  :root {
    --bg: #0f1420;
    --panel: #1a2233;
    --panel2: #222c42;
    --accent: #3b82f6;
    --accent2: #22c55e;
    --red: #ef4444;
    --text: #e8edf5;
    --muted: #8b97ad;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
  }
  .app { width: 100%; max-width: 760px; display: flex; flex-direction: column; gap: 16px; }
  h1 { font-size: 22px; font-weight: 600; text-align: center; }
  h1 span { color: var(--accent); }
  .hint { text-align: center; color: var(--muted); font-size: 13px; }

  .controls {
    background: var(--panel);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    justify-content: center;
  }
  select {
    background: var(--panel2);
    color: var(--text);
    border: 1px solid #2e3a55;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 15px;
    cursor: pointer;
    min-width: 160px;
  }
  .swap {
    background: var(--panel2);
    border: 1px solid #2e3a55;
    color: var(--accent);
    border-radius: 8px;
    width: 42px; height: 42px;
    font-size: 18px;
    cursor: pointer;
    transition: transform .2s;
  }
  .swap:hover { transform: rotate(180deg); }

  .toggles { display: flex; gap: 18px; justify-content: center; flex-wrap: wrap; }
  .toggle { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--muted); cursor: pointer; user-select: none; }
  .toggle input { accent-color: var(--accent); width: 16px; height: 16px; cursor: pointer; }

  .mic-row { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .mic-btn {
    width: 84px; height: 84px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 34px;
    cursor: pointer;
    transition: all .25s;
    box-shadow: 0 0 0 0 rgba(59,130,246,.5);
  }
  .mic-btn.listening {
    background: var(--red);
    animation: pulse 1.6s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(239,68,68,.5); }
    70% { box-shadow: 0 0 0 22px rgba(239,68,68,0); }
    100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
  }
  .status { font-size: 14px; color: var(--muted); min-height: 20px; }
  .status.active { color: var(--accent2); }

  .live {
    background: var(--panel);
    border-radius: var(--radius);
    padding: 14px 18px;
    min-height: 52px;
    font-size: 16px;
    color: var(--muted);
    font-style: italic;
  }

  .subtitle {
    background: linear-gradient(180deg, #15326b, #102345);
    border: 1px solid #2a4a8c;
    border-radius: var(--radius);
    padding: 18px 20px;
    min-height: 64px;
    font-size: 22px;
    line-height: 1.4;
    font-weight: 500;
  }
  .subtitle .label { display: block; font-size: 11px; letter-spacing: 1px; color: #7ea4e8; margin-bottom: 6px; font-weight: 600; }

  .history {
    background: var(--panel);
    border-radius: var(--radius);
    padding: 16px;
    max-height: 320px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .history:empty::before { content: 'История перевода появится здесь…'; color: var(--muted); font-size: 14px; }
  .entry { background: var(--panel2); border-radius: 10px; padding: 10px 14px; }
  .entry .orig { color: var(--muted); font-size: 14px; margin-bottom: 4px; }
  .entry .trans { font-size: 16px; }
  .entry .time { float: right; font-size: 11px; color: var(--muted); }

  .footer-btns { display: flex; gap: 10px; justify-content: center; }
  .small-btn {
    background: var(--panel2); border: 1px solid #2e3a55; color: var(--muted);
    border-radius: 8px; padding: 8px 14px; font-size: 13px; cursor: pointer;
  }
  .small-btn:hover { color: var(--text); }
  .error { color: var(--red); text-align: center; font-size: 14px; }
</style>
</head>
<body>
<div class="app">
  <h1>🎙 Переводчик <span>звонков</span></h1>
  <p class="hint">Запустите рядом со звонком (Zoom / Meet / Teams). Говорите — перевод появится субтитрами и будет озвучен. Рекомендуются наушники, чтобы озвучка не попадала в микрофон.</p>

  <div class="controls">
    <select id="srcLang"></select>
    <button class="swap" id="swapBtn" title="Поменять языки">⇄</button>
    <select id="tgtLang"></select>
  </div>

  <div class="toggles">
    <label class="toggle"><input type="checkbox" id="ttsOn" checked> Озвучивать перевод</label>
    <label class="toggle"><input type="checkbox" id="autoDetect"> Авто: переводить в обе стороны</label>
  </div>

  <div class="mic-row">
    <button class="mic-btn" id="micBtn">🎤</button>
    <div class="status" id="status">Нажмите микрофон, чтобы начать</div>
  </div>

  <div class="live" id="live">Распознаваемая речь появится здесь…</div>

  <div class="subtitle" id="subtitle">
    <span class="label">ПЕРЕВОД</span>
    <span id="subtitleText">—</span>
  </div>

  <div class="history" id="history"></div>

  <div class="footer-btns">
    <button class="small-btn" id="clearBtn">Очистить историю</button>
    <button class="small-btn" id="copyBtn">Скопировать всё</button>
  </div>
  <div class="error" id="error"></div>
</div>

<script>
const LANGS = [
  ['ru-RU','ru','Русский'], ['en-US','en','English'], ['de-DE','de','Deutsch'],
  ['fr-FR','fr','Français'], ['es-ES','es','Español'], ['it-IT','it','Italiano'],
  ['pl-PL','pl','Polski'], ['pt-PT','pt','Português'], ['uk-UA','uk','Українська'],
  ['zh-CN','zh-CN','中文'], ['ja-JP','ja','日本語'], ['tr-TR','tr','Türkçe'], ['ar-SA','ar','العربية']
];

const $ = id => document.getElementById(id);
const srcSel = $('srcLang'), tgtSel = $('tgtLang');

LANGS.forEach(([code,, name]) => {
  srcSel.add(new Option(name, code));
  tgtSel.add(new Option(name, code));
});
srcSel.value = 'ru-RU';
tgtSel.value = 'en-US';

const shortCode = full => LANGS.find(l => l[0] === full)[1];

let recognition = null;
let listening = false;
let speaking = false;
let restartTimer = null;

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (!SR) {
  $('error').textContent = 'Распознавание речи не поддерживается в этом браузере. Откройте в Chrome или Edge.';
  $('micBtn').disabled = true;
}

function buildRecognition() {
  const r = new SR();
  r.lang = srcSel.value;
  r.continuous = true;
  r.interimResults = true;

  r.onresult = async (e) => {
    if (speaking) return; // анти-эхо: игнорируем собственную озвучку
    let interim = '', finalText = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      e.results[i].isFinal ? finalText += t : interim += t;
    }
    if (interim) $('live').textContent = interim;
    if (finalText.trim()) {
      $('live').textContent = finalText;
      handlePhrase(finalText.trim());
    }
  };

  r.onerror = (e) => {
    if (e.error === 'not-allowed') {
      $('error').textContent = 'Нет доступа к микрофону. Разрешите доступ в настройках браузера.';
      stopListening();
    }
    // 'no-speech' и 'aborted' — нормальны, перезапустимся в onend
  };

  r.onend = () => {
    if (listening && !speaking) {
      clearTimeout(restartTimer);
      restartTimer = setTimeout(() => { try { r.start(); } catch(_){} }, 250);
    }
  };
  return r;
}

async function translate(text, from, to) {
  // 1) Google (неофициальный endpoint, без ключа)
  try {
    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${from}&tl=${to}&dt=t&q=${encodeURIComponent(text)}`;
    const res = await fetch(url);
    if (res.ok) {
      const data = await res.json();
      return data[0].map(x => x[0]).join('');
    }
  } catch(_) {}
  // 2) Fallback: MyMemory
  try {
    const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${from}|${to}`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.responseData?.translatedText) return data.responseData.translatedText;
  } catch(_) {}
  throw new Error('translate failed');
}

// Простая эвристика определения языка для режима "в обе стороны"
function looksLike(text, lang) {
  if (lang === 'ru' || lang === 'uk') return /[а-яё]/i.test(text);
  if (lang === 'zh-CN') return /[一-鿿]/.test(text);
  if (lang === 'ja') return /[぀-ヿ]/.test(text);
  if (lang === 'ar') return /[؀-ۿ]/.test(text);
  return /[a-z]/i.test(text) && !/[а-яё]/i.test(text);
}

async function handlePhrase(text) {
  let from = shortCode(srcSel.value), to = shortCode(tgtSel.value);
  if ($('autoDetect').checked && looksLike(text, to) && !looksLike(text, from)) {
    [from, to] = [to, from]; // фраза на целевом языке — переводим обратно
  }
  try {
    const translated = await translate(text, from, to);
    $('subtitleText').textContent = translated;
    addHistory(text, translated);
    if ($('ttsOn').checked) speak(translated, to);
  } catch(_) {
    $('error').textContent = 'Ошибка перевода — проверьте интернет.';
    setTimeout(() => $('error').textContent = '', 4000);
  }
}

function speak(text, langShort) {
  const full = LANGS.find(l => l[1] === langShort)?.[0] || 'en-US';
  const u = new SpeechSynthesisUtterance(text);
  u.lang = full;
  const voice = speechSynthesis.getVoices().find(v => v.lang.startsWith(full.split('-')[0]));
  if (voice) u.voice = voice;
  u.rate = 1.05;
  speaking = true;
  try { recognition?.stop(); } catch(_){} // пауза распознавания на время озвучки
  u.onend = u.onerror = () => {
    speaking = false;
    if (listening) { clearTimeout(restartTimer); restartTimer = setTimeout(() => { try { recognition.start(); } catch(_){} }, 300); }
  };
  speechSynthesis.speak(u);
}

function addHistory(orig, trans) {
  const div = document.createElement('div');
  div.className = 'entry';
  const time = new Date().toLocaleTimeString().slice(0,5);
  div.innerHTML = `<div class="orig"><span class="time">${time}</span></div><div class="trans"></div>`;
  div.querySelector('.orig').prepend(document.createTextNode(orig));
  div.querySelector('.trans').textContent = trans;
  $('history').prepend(div);
}

function startListening() {
  recognition = buildRecognition();
  try { recognition.start(); } catch(_) { return; }
  listening = true;
  $('micBtn').classList.add('listening');
  $('micBtn').textContent = '⏸';
  $('status').textContent = 'Слушаю… говорите';
  $('status').classList.add('active');
  speechSynthesis.getVoices(); // прогрев списка голосов
}

function stopListening() {
  listening = false;
  clearTimeout(restartTimer);
  try { recognition?.stop(); } catch(_){}
  speechSynthesis.cancel();
  speaking = false;
  $('micBtn').classList.remove('listening');
  $('micBtn').textContent = '🎤';
  $('status').textContent = 'Остановлено. Нажмите, чтобы продолжить';
  $('status').classList.remove('active');
}

$('micBtn').onclick = () => listening ? stopListening() : startListening();

$('swapBtn').onclick = () => {
  [srcSel.value, tgtSel.value] = [tgtSel.value, srcSel.value];
  if (listening) { stopListening(); startListening(); }
};
srcSel.onchange = tgtSel.onchange = () => { if (listening) { stopListening(); startListening(); } };

$('clearBtn').onclick = () => { $('history').innerHTML = ''; $('subtitleText').textContent = '—'; };
$('copyBtn').onclick = () => {
  const lines = [...$('history').children].reverse().map(e =>
    e.querySelector('.orig').textContent.trim() + '\n→ ' + e.querySelector('.trans').textContent).join('\n\n');
  navigator.clipboard.writeText(lines);
  $('copyBtn').textContent = 'Скопировано ✓';
  setTimeout(() => $('copyBtn').textContent = 'Скопировать всё', 1500);
};
</script>
</body>
</html>
